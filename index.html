<script>
/* ════════════════════════════════════════════════════════
   ▼ 1) 배포한 GAS 웹앱 주소(…/exec)  (thesis-board.gs 설정 6번) */
const API_URL = "https://script.google.com/macros/s/AKfycbwKvHfqxIggH08RuxpCRAsJ29lnSA9BnPVGl86Bl3hJcqhDWDDek6UdSEwdoeMeXfus/exec";
const DEFAULT_USER = "jinwook";
const ICAL_URL = "https://calendar.google.com/calendar/ical/090l8qctq19pu2dmclcnnn4134%40group.calendar.google.com/public/basic.ics";
/* ▼ 2) Cusdis 앱 ID  (cusdis.com 가입 → New Website → data-app-id 값)
        비워두면 댓글 영역에 "설정 필요" 안내만 떠요. */
const CUSDIS_APP_ID = "5d7f96f3-255c-4c55-98fd-cddd08589e02";
/* 비밀번호는 여기 없음 — Apps Script [스크립트 속성]의 EDIT_PASSWORD 에 보관 */
/* ════════════════════════════════════════════════════════ */

const STATUSES = [["valid","유효"],["watch","주의"],["broken","위험"]];
const STATUS_KO = Object.fromEntries(STATUSES);

let users = [], currentUser = DEFAULT_USER;
let board = { title:"포트폴리오", overall:"", updatedAt:null, positions:[] };
let stateName = "loading";   // loading | ok | error | setup
let editing = false, askingPw = false, pwError = false, pwBusy = false, saving = false;
let sessionPassword = null;  // 검증된 비번을 세션 동안만 메모리 보관(새로고침 시 사라짐)
let historyOpen = false, historyItems = null, historyLoading = false;
let comments = [], commentsLoaded = false, commentBusy = false;
let prices = {}, pricesAt = null, showReturns = false, pricesBusy = false;
let autoSaveTimer = null;
let privatePositions = {}; // ticker → {avgPrice, shares} — localStorage 캐시
let verdictPending = null; // {i, status} — 비번 확인 후 적용할 상태 변경
let killConds = {}; // ticker → string — pre-mortem 조건 (localStorage)
let reviewed = {};  // ticker → timestamp — 마지막 검토 시각 (localStorage)
let calEvents = [], calLoaded = false, calOpen = false, calViewMonth = null;

function saveKillConds(){ try{ localStorage.setItem('killconds_'+currentUser, JSON.stringify(killConds)); }catch(e){} }
function saveReviewed(){  try{ localStorage.setItem('reviewed_'+currentUser,  JSON.stringify(reviewed));  }catch(e){} }

/* ── 현재가 조회 (Apps Script → 네이버 금융) ── */
async function fetchPrices(){
  if (pricesBusy) return;
  pricesBusy = true; renderLedger();
  const tickerKeys = [...new Set(board.positions.filter(p=>p.ticker).map(p=>(p.market==='KOSDAQ'?'KOSDAQ':'KRX')+':'+(p.ticker||'').padStart(6,'0')))];
  if (!tickerKeys.length){ pricesBusy=false; renderLedger(); return; }
  try{
    const r = await fetch(API_URL + '?action=prices&tickers=' + encodeURIComponent(tickerKeys.join(',')));
    const res = await r.json();
    if (res && res.ok){
      prices = res.prices || {};
      pricesAt = new Date();
      localStorage.setItem('prices_cache_'+currentUser, JSON.stringify({ prices, pricesAt }));
      const found = Object.keys(prices).length;
      toast(found+'/'+tickerKeys.length+'개 현재가 조회 완료');
    } else {
      toast('현재가 조회 실패');
    }
  }catch(e){ toast('현재가 조회 실패'); }
  pricesBusy = false; renderLedger();
}

/* ── API ── */
async function apiGet(){ const r = await fetch(API_URL, { method:"GET" }); return await r.json(); }
async function apiPost(payload){
  const r = await fetch(API_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
  return await r.json();
}

async function loadUsers(){
  try{
    const r = await fetch(API_URL + '?action=users');
    const res = await r.json();
    if(res && res.users && res.users.length) users = res.users;
  }catch(e){}
}

async function load(){
  if (!API_URL || API_URL.indexOf("http") !== 0){ stateName="setup"; renderAll(); return; }
  stateName="loading"; renderAll();
  try{
    const r = await fetch(API_URL + '?user=' + encodeURIComponent(currentUser));
    const data = await r.json();
    if (!data || !Array.isArray(data.positions)) throw new Error("bad payload");
    board = data; stateName="ok";
  }catch(e){ stateName="error"; }
  renderAll();
}

function renderUserTabs(){
  const host = document.getElementById("user-tabs-host"); if(!host) return;
  host.innerHTML = "";
  if(users.length <= 1) return;
  const wrap = mk("div","user-tabs-wrap");
  users.forEach(u=>{
    const tab = mk("button","user-tab"+(currentUser===u.id?" active":""), u.name||u.id);
    tab.onclick=()=>switchUser(u.id);
    wrap.appendChild(tab);
  });
  host.appendChild(wrap);
}

function switchUser(id){
  if(id === currentUser) return;
  currentUser = id;
  editing=false; sessionPassword=null; askingPw=false; pwError=false;
  comments=[]; commentsLoaded=false; historyOpen=false; historyItems=null;
  try{
    const c = JSON.parse(localStorage.getItem('prices_cache_'+currentUser)||'null');
    if(c && c.prices){ prices=c.prices; pricesAt=new Date(c.pricesAt); } else { prices={}; pricesAt=null; }
    const cp = JSON.parse(localStorage.getItem('private_positions_'+currentUser)||'null');
    privatePositions = cp || {};
  }catch(e){ prices={}; pricesAt=null; privatePositions={}; }
  load();
}

function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(()=>{ if(editing) save(true); }, 1500);
}

async function save(isAuto=false){
  if (saving) return;
  saving = true; renderSavebar();
  try{
    const res = await apiPost({ action:"save", user:currentUser, password:sessionPassword, board:board });
    if (res && res.ok){
      toast(isAuto ? "자동저장 완료" : "저장됨");
      saving=false;
      if (!isAuto){ editing=false; await load(); return; }
      renderSavebar(); return;
    }
    if (res && res.error === "auth"){ toast("비밀번호가 만료됐어요 — 다시 수정을 눌러주세요"); editing=false; sessionPassword=null; saving=false; await load(); return; }
    toast("저장 실패 — 다시 시도해 주세요");
  }catch(e){ toast("저장 실패 — 네트워크/주소를 확인하세요"); }
  saving=false; renderSavebar();
}

async function quickSetStatus(i, status){
  if(board.positions[i].status === status) return;
  board.positions[i].status = status;
  const ticker = board.positions[i].ticker;
  if(ticker){ reviewed[ticker] = Date.now(); saveReviewed(); }
  renderList();
  if(!sessionPassword){
    verdictPending = {i, status};
    askingPw=true; pwError=false; renderActions();
    return;
  }
  await quickSave();
}

async function quickSave(){
  try{
    const res = await apiPost({ action:"save", user:currentUser, password:sessionPassword, board:board });
    if(res && res.ok){ toast("저장됨"); }
    else if(res && res.error==="auth"){ toast("인증 만료 — 다시 클릭해주세요"); sessionPassword=null; }
    else toast("저장 실패");
  }catch(e){ toast("저장 실패"); }
}

/* ── 렌더 ── */
function renderAll(){ renderUserTabs(); renderMeta(); renderActions(); renderOverall(); renderList(); renderLedger(); renderComments(); renderSavebar(); renderModal(); }

function renderMeta(){
  document.getElementById("pf-title").textContent = board.title || "포트폴리오";
  const m = document.getElementById("pf-meta");
  if (editing){ m.textContent = "수정 중 — 변경 후 저장을 누르세요"; return; }
  if (stateName==="loading"){ m.textContent = "불러오는 중…"; return; }
  if (stateName==="setup"){ m.textContent = "설정 필요 · 코드 상단 API_URL을 채우세요"; return; }
  if (stateName==="error"){ m.textContent = "불러오지 못했어요 · API 주소/배포 확인"; return; }
  m.textContent = board.updatedAt ? "마지막 업데이트 · " + fmt(board.updatedAt) : "읽기 전용";
}

function renderActions(){
  const host = document.getElementById("actions"); host.innerHTML = "";
  if (stateName !== "ok" && !editing) return;

  if (editing){
    const hist = mk("button","btn sm","기록"); hist.onclick=()=>openHistory();
    host.appendChild(hist); return;
  }
  if (askingPw){
    const box = mk("div","pw");
    const inp = document.createElement("input"); inp.type="password"; inp.placeholder="비밀번호"; inp.disabled=pwBusy;
    inp.onkeydown = (e)=>{ if(e.key==="Enter") tryUnlock(inp.value); if(e.key==="Escape"){ askingPw=false; pwError=false; renderAll(); } };
    const go = mk("button","btn primary sm", pwBusy?"확인 중…":"확인"); go.disabled=pwBusy; go.onclick=()=>tryUnlock(inp.value);
    box.appendChild(inp); box.appendChild(go);
    if (pwError) box.appendChild(mk("span","err","불일치"));
    host.appendChild(box); setTimeout(()=>inp.focus(),0); return;
  }
  const edit = mk("button","btn","수정"); edit.onclick=()=>{ askingPw=true; pwError=false; renderAll(); };
  host.appendChild(edit);
}

async function tryUnlock(v){
  if (pwBusy) return;
  pwBusy=true; pwError=false; renderActions();
  try{
    const res = await apiPost({ action:"auth", user:currentUser, password:v });
    if (res && res.ok && res.board){
      sessionPassword=v; board=res.board; askingPw=false; pwError=false;
      const priv={};
      board.positions.forEach(p=>{ priv[p.ticker]={avgPrice:p.avgPrice,shares:p.shares}; });
      privatePositions=priv;
      localStorage.setItem('private_positions_'+currentUser, JSON.stringify(priv));
      if(verdictPending !== null){
        board.positions[verdictPending.i].status = verdictPending.status;
        verdictPending = null;
        pwBusy=false; renderAll();
        await quickSave(); return;
      }
      editing=true;
    }
    else pwError=true;
  }catch(e){ pwError=true; toast("확인 실패 — 네트워크/주소를 확인하세요"); }
  pwBusy=false; renderAll();
}

function renderOverall(){
  const host = document.getElementById("overall-host"); host.innerHTML = "";
  if (stateName==="setup"){ host.appendChild(noticeEl("설정이 필요해요","함께 받은 Apps Script(thesis-board.gs)를 배포하면 …/exec 주소가 나와요. 그 주소를 이 코드 상단 API_URL에 넣으면 연결됩니다.")); return; }
  if (stateName==="error"){ host.appendChild(noticeEl("데이터를 불러오지 못했어요","API_URL이 맞는지, Apps Script가 “모든 사용자” 액세스로 새 버전 배포됐는지 확인해 주세요.")); return; }

  if (editing){
    const box = mk("div","overall"); box.appendChild(mk("span","lab","전체 메모 (선택)"));
    const ta = document.createElement("textarea"); ta.className="f"; ta.rows=2; ta.value=board.overall||"";
    ta.placeholder="포트폴리오 전체에 대한 한 줄 — 비중 방향, 현금 비중, 이번 주 관전 포인트 등";
    ta.oninput=()=>{ board.overall=ta.value; scheduleAutoSave(); }; box.appendChild(ta); host.appendChild(box);
  } else if (board.overall && board.overall.trim()){
    const box = mk("div","overall"); box.appendChild(mk("span","lab","전체 메모"));
    const p = document.createElement("div"); p.textContent=board.overall; box.appendChild(p); host.appendChild(box);
  }
}

function renderList(){
  const list = document.getElementById("list"); list.innerHTML = "";
  if (stateName!=="ok") return;

  if (!editing && board.positions.length === 0){
    const e = mk("div","empty-state",""); e.innerHTML = "아직 종목이 없어요.<br><b>수정</b>을 눌러 첫 종목과 메인 아이디어를 추가하세요.";
    list.appendChild(e); return;
  }

  board.positions.forEach((p, i) => {
    const card = mk("div","card"); card.style.animationDelay = (i*55)+"ms";
    card.appendChild(mk("div","spine "+p.status));

    if (!editing){
      const head = mk("div","card-head"); const ident = mk("div","ident");
      ident.appendChild(mk("span","name", p.name || "(이름 없음)"));
      if (p.ticker) ident.appendChild(mk("span","ticker", p.ticker));
      const chip = mk("div","chip "+p.status, ""); chip.innerHTML = '<span class="dot '+p.status+'"></span>'+STATUS_KO[p.status];
      head.appendChild(ident); head.appendChild(chip); card.appendChild(head);
      card.appendChild(mk("div","idea"+(p.idea&&p.idea.trim()?"":" empty"), p.idea && p.idea.trim() ? p.idea : "메인 아이디어가 비어 있어요"));
      if (p.note && p.note.trim()) card.appendChild(mk("div","note", p.note));

      // ① Pre-mortem: 틀릴 조건
      const kc = p.ticker ? (killConds[p.ticker]||"") : "";
      if(kc.trim()){
        const kcBox = mk("div","kill-cond");
        kcBox.appendChild(mk("span","kill-cond-lab","⚠ 틀릴 조건"));
        kc.trim().split("\n").filter(l=>l.trim()).forEach(line=>{
          kcBox.appendChild(mk("div","kill-cond-item","• "+line.trim()));
        });
        card.appendChild(kcBox);
      }

      // ④ Price vs Thesis divergence
      if(p.ticker){
        const priceKey=(p.market==='KOSDAQ'?'KOSDAQ':'KRX')+':'+(p.ticker||'').padStart(6,'0');
        const cp=prices[priceKey]||null;
        const priv=privatePositions[p.ticker]||{};
        const avg=Number(p.avgPrice)||Number(priv.avgPrice)||0;
        if(cp && avg>0){
          const chg=(cp-avg)/avg;
          if(p.status==='valid' && chg<=-0.1){
            card.appendChild(mk("div","diverge-alert down",`📉 논거 유지 · 평단 대비 ${(chg*100).toFixed(1)}% — 추가매수 검토?`));
          } else if((p.status==='watch'||p.status==='broken') && chg>=0.1){
            card.appendChild(mk("div","diverge-alert up",`📈 논거 흔들림 · 평단 대비 +${(chg*100).toFixed(1)}% — 매도 검토?`));
          }
        }
      }

      // ② Staleness + verdict buttons
      const varea = mk("div","verdict-area");
      if(p.ticker){
        const lastRev = reviewed[p.ticker]||null;
        const days = lastRev ? Math.floor((Date.now()-lastRev)/(864e5)) : null;
        if(days===null){
          varea.appendChild(mk("span","stale-badge","첫 리뷰 필요"));
        } else if(days>60){
          varea.appendChild(mk("span","stale-badge",days+"일 미검토"));
        } else {
          varea.appendChild(mk("span","fresh-badge",days===0?"오늘 검토됨":days+"일 전 검토됨"));
        }
      }
      const vrow = mk("div","verdict-row");
      [["valid","✓ 유지"],["watch","? 의심"],["broken","✗ 폐기"]].forEach(([st,label])=>{
        const btn = mk("button","verdict-btn"+(p.status===st?" active "+st:""), label);
        btn.onclick=()=>quickSetStatus(i, st);
        vrow.appendChild(btn);
      });
      varea.appendChild(vrow);
      card.appendChild(varea);
    } else {
      const grid = mk("div","grid2");
      const c1 = document.createElement("div"); c1.appendChild(labEl("종목명")); c1.appendChild(inputEl(p.name,"예: 하나머티리얼즈", v=>p.name=v));
      const c2 = document.createElement("div"); c2.appendChild(labEl("종목코드")); c2.appendChild(inputEl(p.ticker,"166090", v=>p.ticker=v, true));
      grid.appendChild(c1); grid.appendChild(c2); card.appendChild(grid);

      const gridB = mk("div","grid2");
      const b1 = document.createElement("div"); b1.appendChild(labEl("평균매수단가 (원)")); b1.appendChild(numInputEl(p.avgPrice,"45200", v=>p.avgPrice=v));
      const b2 = document.createElement("div"); b2.appendChild(labEl("주식수")); b2.appendChild(numInputEl(p.shares,"120", v=>p.shares=v));
      gridB.appendChild(b1); gridB.appendChild(b2); card.appendChild(gridB);

      card.appendChild(labEl("시장"));
      const mktSeg=mk("div","seg");
      [["KOSPI","코스피"],["KOSDAQ","코스닥"]].forEach(([k,ko])=>{ const b=document.createElement("button"); b.textContent=ko; if((p.market||"KOSPI")===k) b.className="on valid"; b.onclick=()=>{ p.market=k; renderList(); }; mktSeg.appendChild(b); });
      card.appendChild(mktSeg);
      card.appendChild(labEl("상태")); card.appendChild(segEl(p));
      card.appendChild(labEl("메인 아이디어 (논거)"));
      const ta = document.createElement("textarea"); ta.className="f"; ta.rows=3; ta.value=p.idea||"";
      ta.placeholder="이 종목을 보유한 핵심 이유 + 무엇이 바뀌면 생각을 접을지"; ta.oninput=()=>{ p.idea=ta.value; scheduleAutoSave(); }; card.appendChild(ta);
      card.appendChild(labEl("메모 (선택)"));
      const tn = document.createElement("textarea"); tn.className="f"; tn.rows=2; tn.value=p.note||"";
      tn.placeholder="오늘 체크한 것 — 신규 공시, 실적, 주가 이탈 등"; tn.oninput=()=>{ p.note=tn.value; scheduleAutoSave(); }; card.appendChild(tn);
      card.appendChild(labEl("틀릴 조건 (Pre-mortem)"));
      const kct = document.createElement("textarea"); kct.className="f"; kct.rows=3;
      kct.value = p.ticker ? (killConds[p.ticker]||"") : "";
      kct.placeholder="이 논거가 틀릴 조건을 줄바꿈으로 구분해 적어두세요\n예: 경쟁사 신규 진입\n하이닉스 내재화\n금리 급등";
      kct.oninput=()=>{ if(p.ticker){ killConds[p.ticker]=kct.value; saveKillConds(); } };
      card.appendChild(kct);

      const foot = mk("div","card-edit-foot"); const del = mk("button","btn danger sm","삭제");
      del.onclick=()=>{ board.positions.splice(i,1); renderList(); renderLedger(); }; foot.appendChild(del); card.appendChild(foot);
    }
    list.appendChild(card);
  });

  if (editing){
    const add = mk("button","btn","＋ 종목 추가"); add.style.alignSelf="flex-start"; add.style.marginTop="2px";
    add.onclick=()=>{ board.positions.push({ name:"", ticker:"", market:"KOSPI", status:"valid", avgPrice:0, shares:0, idea:"", note:"" }); renderList(); renderLedger(); };
    list.appendChild(add);
  }
}

const DONUT_COLORS = ['#0F4C5C','#2E7D54','#2196A5','#B5851A','#7C5CBF','#C7553A','#3A9AD9','#5BAE8F','#E5873A','#6B7280'];

function buildDonut(positions) {
  const tw = positions.reduce((s,p)=>s+(Number(p.weight)||0),0);
  if(tw<=0) return null;
  const cx=100,cy=100,ro=78,ri=50;
  let paths='', angle=-Math.PI/2;
  positions.forEach((p,i)=>{
    const w=(Number(p.weight)||0)/tw;
    if(w<=0) return;
    const a=w*Math.PI*2, ea=angle+a, large=a>Math.PI?1:0;
    const c1=[Math.cos(angle),Math.sin(angle)], c2=[Math.cos(ea),Math.sin(ea)];
    const d=`M${(cx+ri*c1[0]).toFixed(1)},${(cy+ri*c1[1]).toFixed(1)} L${(cx+ro*c1[0]).toFixed(1)},${(cy+ro*c1[1]).toFixed(1)} A${ro},${ro} 0 ${large},1 ${(cx+ro*c2[0]).toFixed(1)},${(cy+ro*c2[1]).toFixed(1)} L${(cx+ri*c2[0]).toFixed(1)},${(cy+ri*c2[1]).toFixed(1)} A${ri},${ri} 0 ${large},0 ${(cx+ri*c1[0]).toFixed(1)},${(cy+ri*c1[1]).toFixed(1)}`;
    paths+=`<path d="${d}" fill="${DONUT_COLORS[i%DONUT_COLORS.length]}" stroke="#fff" stroke-width="2"/>`;
    angle=ea;
  });
  return paths;
}

function renderLedger(){
  const host = document.getElementById("ledger-host"); host.innerHTML = "";
  if (stateName!=="ok" || board.positions.length===0) return;

  if (editing){
    // 수정 모드 — 금액 표시
    const total = board.positions.reduce((s,p)=> s + (p.avgPrice||0)*(p.shares||0), 0);
    const sec = mk("section","ledger"); sec.appendChild(mk("div","section-lab","매수 현황 · 비중은 매수금액 기준"));
    const t = document.createElement("table"); t.className="ledger-t";
    t.innerHTML = "<thead><tr><th>종목</th><th>평균매수단가</th><th>주식수</th><th>매수금액</th><th>비중</th></tr></thead>";
    const tb = document.createElement("tbody");
    board.positions.forEach(p=>{
      const amt=(p.avgPrice||0)*(p.shares||0); const w=total>0?amt/total*100:0;
      const wcell = w>0 ? `<td class="num"><span class="wcell"><span class="wbar" style="width:${w.toFixed(0)}%"></span><span class="wval">${w.toFixed(1)}%</span></span></td>` : `<td class="num">—</td>`;
      const tr=document.createElement("tr");
      tr.innerHTML = `<td class="nm">${esc(p.name||"(이름 없음)")}</td><td class="num">${fmtN(p.avgPrice||0)}</td><td class="num">${fmtN(p.shares||0)}</td><td class="num">${fmtN(amt)}</td>`+wcell;
      tb.appendChild(tr);
    });
    t.appendChild(tb);
    const tf=document.createElement("tfoot");
    tf.innerHTML = `<tr><td>합계</td><td class="num">—</td><td class="num">—</td><td class="num">${fmtN(total)}</td><td class="num">${total>0?"100%":"—"}</td></tr>`;

const SHIFT_INFO = {
  'D':  { bg:'#DBEAFE', color:'#1E40AF', time:'07:00 ~ 14:00' },
  'A':  { bg:'#FEF3C7', color:'#92400E', time:'14:00 ~ 20:00' },
  'N':  { bg:'#1E293B', color:'#E2E8F0', time:'전날 20:00 ~ 07:00' },
  'DA': { bg:'#CFFAFE', color:'#0E7490', time:'07:00 ~ 20:00' },
  'NA': { bg:'#312E81', color:'#FDE68A', time:'전날 20:00 ~ 07:00 / 14:00 ~ 20:00' },
  'W':  { bg:'#EDE9FE', color:'#5B21B6', time:'' },
  '비번': { bg:'#EDE9FE', color:'#5B21B6', time:'' },
  '휴무': { bg:'#D1FAE5', color:'#065F46', time:'' },
  '휴가': { bg:'#D1FAE5', color:'#065F46', time:'' },
};
function getShiftInfo(s){
  const u = s.trim().toUpperCase();
  if(u==='DA') return SHIFT_INFO['DA'];
  if(u==='NA') return SHIFT_INFO['NA'];
  if(u==='W'||u.startsWith('W(')) return SHIFT_INFO['W'];
  if(u==='D'||u.startsWith('D ')) return SHIFT_INFO['D'];
  if(u==='A'||u.startsWith('A ')) return SHIFT_INFO['A'];
  if(u==='N'||u.startsWith('N ')) return SHIFT_INFO['N'];
  for(const [k,v] of Object.entries(SHIFT_INFO)) if(s.includes(k)) return v;
  return {bg:'#F3F4F6', color:'#374151', time:''};
}
function getCombinedTime(evs){
  // Single event: look up time directly from SHIFT_INFO
  if(evs.length===1) return getShiftInfo(evs[0].summary).time || null;
  // Multiple separate events: compute combined range
  const HOURS={'D':[7*60,14*60],'A':[14*60,20*60]};
  const hm=m=>String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
  const hasN=evs.some(ev=>{const u=ev.summary.trim().toUpperCase();return u==='N'||u==='NA';});
  const daEvs=evs.filter(ev=>{const u=ev.summary.trim().toUpperCase();return u==='D'||u.startsWith('D ')||u==='A'||u.startsWith('A ')||u==='DA';});
  if(hasN&&daEvs.length===0) return '전날 20:00 ~ 07:00';
  let s=Infinity,e=-Infinity;
  daEvs.forEach(ev=>{
    const u=ev.summary.trim().toUpperCase();
    const pairs=u==='DA'?[[7*60,20*60]]:u==='D'||u.startsWith('D ')?[[7*60,14*60]]:[[14*60,20*60]];
    pairs.forEach(([a,b])=>{s=Math.min(s,a);e=Math.max(e,b);});
  });
  if(s===Infinity)return null;
  return hm(s)+' ~ '+hm(e);
}
function getWeekMon(date){
  const d=new Date(date); d.setHours(0,0,0,0);
  const day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); return d;
}

function parseIcalDate(key, val){
  const allDay = key.includes('VALUE=DATE') || (val.length===8 && !val.includes('T'));
  if(allDay){ const y=+val.slice(0,4),m=+val.slice(4,6)-1,d=+val.slice(6,8); return {d:new Date(y,m,d),allDay:true}; }
  const y=+val.slice(0,4),mo=+val.slice(4,6)-1,dy=+val.slice(6,8),h=+val.slice(9,11),mi=+val.slice(11,13),s=+val.slice(13,15);
  return { d: val.endsWith('Z') ? new Date(Date.UTC(y,mo,dy,h,mi,s)) : new Date(y,mo,dy,h,mi,s), allDay:false };
}

function parseIcal(text){
  text = text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  const evs=[]; const re=/BEGIN:VEVENT([\s\S]*?)END:VEVENT/g; let m;
  while((m=re.exec(text))!==null){
    const block=m[1], ev={};
    const lr=/^([A-Z\-]+(?:;[^:]+)?):(.*)/gm; let lm;
    while((lm=lr.exec(block))!==null){
      const k=lm[1],v=lm[2].trim(),bk=k.split(';')[0];
      if(bk==='DTSTART') ev.start=parseIcalDate(k,v);
      if(bk==='DTEND')   ev.end=parseIcalDate(k,v);
      if(bk==='SUMMARY') ev.summary=v.replace(/\\,/g,',').replace(/\\/g,'').trim();
    }
    if(ev.summary&&ev.start) evs.push(ev);
  }
  return evs;
}

function evOnDate(ev, date){
  const check = new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const s = new Date(ev.start.d.getFullYear(),ev.start.d.getMonth(),ev.start.d.getDate());
  const eRaw = ev.end ? ev.end.d : ev.start.d;
  let e = new Date(eRaw.getFullYear(),eRaw.getMonth(),eRaw.getDate());
  if(ev.start.allDay && ev.end) e.setDate(e.getDate()-1); // iCal allDay end is exclusive
  return check >= s && check <= e;
}

function renderCal(){
  const host = document.getElementById('cal-host'); if(!host) return;
  host.innerHTML='';
  if(!calLoaded){ host.innerHTML='<div class="cal-widget"><span class="cal-loading">스케줄을 불러오지 못했어요</span></div>'; return; }
  const w = mk('div','cal-widget');
  const today = new Date(); today.setHours(0,0,0,0);
  const DOW = ['일','월','화','수','목','금','토'];

  // 헤더
  const hdr = mk('div','cal-hdr');
  hdr.appendChild(mk('span','cal-hdr-lab','📅 스케줄'));
  const togBtn = mk('button','btn sm', calOpen?'달력 닫기':'이번 달');
  togBtn.onclick=()=>{ calOpen=!calOpen; renderCal(); };
  hdr.appendChild(togBtn); w.appendChild(hdr);

  // 오늘/내일
  const strip = mk('div','cal-strip');
  [today, new Date(today.getTime()+864e5)].forEach(date=>{
    const col = mk('div','cal-strip-col');
    col.appendChild(mk('div','cal-strip-date',`${date.getMonth()+1}/${date.getDate()} (${DOW[date.getDay()]})`));
    const evs = calEvents.filter(ev=>evOnDate(ev,date));
    if(evs.length){
      const chipRow=mk('div','cal-chip-row');
      evs.forEach(ev=>{
        const info=getShiftInfo(ev.summary);
        const chip=mk('div','cal-chip',ev.summary); chip.style.background=info.bg; chip.style.color=info.color;
        chipRow.appendChild(chip);
      });
      col.appendChild(chipRow);
      const combined=getCombinedTime(evs);
      if(combined) col.appendChild(mk('div','cal-time',combined));
    } else col.appendChild(mk('div','cal-empty','일정 없음'));
    strip.appendChild(col);
  });
  w.appendChild(strip);

  // 이번 주 표
  const mon = getWeekMon(today);
  const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
  const wsec = mk('div','cal-week-section');
  wsec.appendChild(mk('div','cal-week-label','이번 주'));
  const tbl=document.createElement('table'); tbl.className='cal-week-table';
  const thead=document.createElement('thead'), hrow=document.createElement('tr');
  weekDays.forEach((d,i)=>{
    const th=document.createElement('th'); th.className='cal-week-th';
    th.textContent=['월','화','수','목','금','토','일'][i];
    if(i===5) th.style.color='#3B82F6'; if(i===6) th.style.color='#EF4444';
    if(d.toDateString()===today.toDateString()) th.style.color='var(--valid)';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow); tbl.appendChild(thead);
  const tbody=document.createElement('tbody'), tr=document.createElement('tr');
  weekDays.forEach(d=>{
    const td=document.createElement('td'); td.className='cal-week-td';
    if(d.toDateString()===today.toDateString()) td.classList.add('cal-week-today');
    const evs=calEvents.filter(ev=>evOnDate(ev,d));
    if(evs.length){
      evs.forEach(ev=>{
        const info=getShiftInfo(ev.summary);
        const chip=mk('div','cal-cell-chip',ev.summary); chip.style.background=info.bg; chip.style.color=info.color;
        td.appendChild(chip);
      });
    } else { const dot=mk('span','','·'); dot.style.color='var(--ink-3)'; td.appendChild(dot); }
    tr.appendChild(td);
  });
  tbody.appendChild(tr); tbl.appendChild(tbody); wsec.appendChild(tbl); w.appendChild(wsec);

  // 월 달력 (토글)
  if(calOpen && calViewMonth){
    const mw=mk('div','cal-month-wrap');
    const nav=mk('div','cal-month-nav');
    const prev=mk('button','btn sm','‹'); prev.onclick=()=>{ calViewMonth.m--; if(calViewMonth.m<0){calViewMonth.m=11;calViewMonth.y--;} renderCal(); };
    const next=mk('button','btn sm','›'); next.onclick=()=>{ calViewMonth.m++; if(calViewMonth.m>11){calViewMonth.m=0;calViewMonth.y++;} renderCal(); };
    nav.appendChild(prev); nav.appendChild(mk('span','cal-month-label',`${calViewMonth.y}년 ${calViewMonth.m+1}월`)); nav.appendChild(next);
    mw.appendChild(nav);
    const mhrow=mk('div','cal-month-hrow');
    DOW.forEach((d,i)=>{ const dh=mk('div','cal-month-dh',d); if(i===0)dh.style.color='#EF4444'; if(i===6)dh.style.color='#3B82F6'; mhrow.appendChild(dh); });
    mw.appendChild(mhrow);
    const first=new Date(calViewMonth.y,calViewMonth.m,1), last=new Date(calViewMonth.y,calViewMonth.m+1,0);
    const cells=[]; for(let i=0;i<first.getDay();i++) cells.push(null);
    for(let d=1;d<=last.getDate();d++) cells.push(new Date(calViewMonth.y,calViewMonth.m,d));
    while(cells.length%7!==0) cells.push(null);
    for(let r=0;r<cells.length/7;r++){
      const row=mk('div','cal-month-row');
      for(let c=0;c<7;c++){
        const date=cells[r*7+c]; const cell=mk('div','cal-month-cell');
        if(date){
          if(date.toDateString()===today.toDateString()) cell.classList.add('today');
          const dn=mk('div','cal-dnum',String(date.getDate()));
          if(c===0) dn.classList.add('sun'); if(c===6) dn.classList.add('sat');
          cell.appendChild(dn);
          calEvents.filter(ev=>evOnDate(ev,date)).forEach(ev=>{
            const info=getShiftInfo(ev.summary);
            const chip=mk('div','cal-cell-chip',ev.summary); chip.style.background=info.bg; chip.style.color=info.color;
            cell.appendChild(chip);
          });
        }
        row.appendChild(cell);
      }
      mw.appendChild(row);
    }
    w.appendChild(mw);
  }
  host.appendChild(w);
}

/* ── 헬퍼 ── */
function segEl(p){
  const seg = mk("div","seg");
  STATUSES.forEach(([k,ko])=>{ const b=document.createElement("button"); b.textContent=ko; if(p.status===k) b.className="on "+k; b.onclick=()=>{ p.status=k; renderList(); }; seg.appendChild(b); });
  return seg;
}
function inputEl(val, ph, onin, mono){ const i=document.createElement("input"); i.className="f"+(mono?" mono":""); i.value=val||""; i.placeholder=ph; i.oninput=()=>onin(i.value); return i; }
function numInputEl(val, ph, onin){
  const i=document.createElement("input"); i.className="f mono"; i.type="text"; i.inputMode="numeric"; i.value=val>0?String(val):""; i.placeholder=ph;
  i.oninput=()=>{ const clean=i.value.replace(/[^\d]/g,""); if(i.value!==clean) i.value=clean; const n=parseInt(clean,10); onin(isNaN(n)?0:n); }; return i;
}
function noticeEl(title, body){ const d=mk("div","notice"); d.appendChild(mk("b",null,title)); d.appendChild(mk("span",null,body)); return d; }
function labEl(t){ const s=document.createElement("span"); s.className="field-lab"; s.textContent=t; return s; }
function mk(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtN(n){ return n>0 ? n.toLocaleString("ko-KR") : "—"; }
function fmt(ts){ const d=new Date(ts), p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2300); }

try {
  const cached = JSON.parse(localStorage.getItem('prices_cache_'+currentUser) || 'null');
  if (cached && cached.prices) { prices = cached.prices; pricesAt = new Date(cached.pricesAt); }
  const cachedPriv = JSON.parse(localStorage.getItem('private_positions_'+currentUser) || 'null');
  if (cachedPriv) privatePositions = cachedPriv;
  const cachedKC = JSON.parse(localStorage.getItem('killconds_'+currentUser) || 'null');
  if (cachedKC) killConds = cachedKC;
  const cachedRev = JSON.parse(localStorage.getItem('reviewed_'+currentUser) || 'null');
  if (cachedRev) reviewed = cachedRev;
} catch(e) {}
loadUsers().then(()=>{ renderUserTabs(); load(); });
fetchCal();
document.getElementById('site-updated').textContent = fmt(new Date(document.lastModified));
