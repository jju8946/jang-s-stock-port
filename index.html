<style>

<script>
/* ════════════════════════════════════════════════════════
   ▼ 1) 배포한 GAS 웹앱 주소(…/exec)  (thesis-board.gs 설정 6번) */
const API_URL = "https://script.google.com/macros/s/AKfycbwKvHfqxIggH08RuxpCRAsJ29lnSA9BnPVGl86Bl3hJcqhDWDDek6UdSEwdoeMeXfus/exec";
const DEFAULT_USER = "jinwook";
/* ▼ 2) Cusdis 앱 ID  (cusdis.com 가입 → New Website → data-app-id 값)
        비워두면 댓글 영역에 "설정 필요" 안내만 떠요. */
const CUSDIS_APP_ID = "5d7f96f3-255c-4c55-98fd-cddd08589e02";
/* 비밀번호는 여기 없음 — Apps Script [스크립트 속성]의 EDIT_PASSWORD 에 보관 */
/* ════════════════════════════════════════════════════════ */

const STATUSES = [["valid","유효"],["watch","주의"],["broken","위험"]];
const STATUS_KO = Object.fromEntries(STATUSES);

let users = [], currentUser = DEFAULT_USER;
let board = { title:"포트폴리오", overall:"", updatedAt:null, positions:[] };
let stateName = "loading";   // loading | ok | error | setup
let editing = false, askingPw = false, pwError = false, pwBusy = false, saving = false;
let sessionPassword = null;  // 검증된 비번을 세션 동안만 메모리 보관(새로고침 시 사라짐)
let historyOpen = false, historyItems = null, historyLoading = false;
let comments = [], commentsLoaded = false, commentBusy = false;
let prices = {}, pricesAt = null, showReturns = false, pricesBusy = false;
let autoSaveTimer = null;
let privatePositions = {}; // ticker → {avgPrice, shares} — localStorage 캐시

/* ── 현재가 조회 (Apps Script → 네이버 금융) ── */
async function fetchPrices(){
  if (pricesBusy) return;
  pricesBusy = true; renderLedger();
  const tickerKeys = [...new Set(board.positions.filter(p=>p.ticker).map(p=>(p.market==='KOSDAQ'?'KOSDAQ':'KRX')+':'+(p.ticker||'').padStart(6,'0')))];
  if (!tickerKeys.length){ pricesBusy=false; renderLedger(); return; }
  try{
    const r = await fetch(API_URL + '?action=prices&tickers=' + encodeURIComponent(tickerKeys.join(',')));
    const res = await r.json();
    if (res && res.ok){
      prices = res.prices || {};
      pricesAt = new Date();
      localStorage.setItem('prices_cache_'+currentUser, JSON.stringify({ prices, pricesAt }));
      const found = Object.keys(prices).length;
      toast(found+'/'+tickerKeys.length+'개 현재가 조회 완료');
    } else {
      toast('현재가 조회 실패');
    }
  }catch(e){ toast('현재가 조회 실패'); }
  pricesBusy = false; renderLedger();
}

/* ── API ── */
async function apiGet(){ const r = await fetch(API_URL, { method:"GET" }); return await r.json(); }
async function apiPost(payload){
  const r = await fetch(API_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
  return await r.json();
}

async function loadUsers(){
  try{
    const r = await fetch(API_URL + '?action=users');
    const res = await r.json();
    if(res && res.users && res.users.length) users = res.users;
  }catch(e){}
}

async function load(){
  if (!API_URL || API_URL.indexOf("http") !== 0){ stateName="setup"; renderAll(); return; }
  stateName="loading"; renderAll();
  try{
    const r = await fetch(API_URL + '?user=' + encodeURIComponent(currentUser));
    const data = await r.json();
    if (!data || !Array.isArray(data.positions)) throw new Error("bad payload");
    board = data; stateName="ok";
  }catch(e){ stateName="error"; }
  renderAll();
}

function renderUserTabs(){
  const host = document.getElementById("user-tabs-host"); if(!host) return;
  host.innerHTML = "";
  if(users.length <= 1) return;
  const wrap = mk("div","user-tabs-wrap");
  users.forEach(u=>{
    const tab = mk("button","user-tab"+(currentUser===u.id?" active":""), u.name||u.id);
    tab.onclick=()=>switchUser(u.id);
    wrap.appendChild(tab);
  });
  host.appendChild(wrap);
}

function switchUser(id){
  if(id === currentUser) return;
  currentUser = id;
  editing=false; sessionPassword=null; askingPw=false; pwError=false;
  comments=[]; commentsLoaded=false; historyOpen=false; historyItems=null;
  try{
    const c = JSON.parse(localStorage.getItem('prices_cache_'+currentUser)||'null');
    if(c && c.prices){ prices=c.prices; pricesAt=new Date(c.pricesAt); } else { prices={}; pricesAt=null; }
    const cp = JSON.parse(localStorage.getItem('private_positions_'+currentUser)||'null');
    privatePositions = cp || {};
  }catch(e){ prices={}; pricesAt=null; privatePositions={}; }
  load();
}

function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(()=>{ if(editing) save(true); }, 1500);
}

async function save(isAuto=false){
  if (saving) return;
  saving = true; renderSavebar();
  try{
    const res = await apiPost({ action:"save", user:currentUser, password:sessionPassword, board:board });
    if (res && res.ok){
      toast(isAuto ? "자동저장 완료" : "저장됨");
      saving=false;
      if (!isAuto){ editing=false; await load(); return; }
      renderSavebar(); return;
    }
    if (res && res.error === "auth"){ toast("비밀번호가 만료됐어요 — 다시 수정을 눌러주세요"); editing=false; sessionPassword=null; saving=false; await load(); return; }
    toast("저장 실패 — 다시 시도해 주세요");
  }catch(e){ toast("저장 실패 — 네트워크/주소를 확인하세요"); }
  saving=false; renderSavebar();
}

async function tryUnlock(v){
  if (pwBusy) return;
  pwBusy=true; pwError=false; renderActions();
  try{
    const res = await apiPost({ action:"auth", user:currentUser, password:v });
    if (res && res.ok && res.board){
      sessionPassword=v; board=res.board; editing=true; askingPw=false; pwError=false;
      const priv={};
      board.positions.forEach(p=>{ priv[p.ticker]={avgPrice:p.avgPrice,shares:p.shares}; });
      privatePositions=priv;
      localStorage.setItem('private_positions_'+currentUser, JSON.stringify(priv));
    }
    else pwError=true;
  }catch(e){ pwError=true; toast("확인 실패 — 네트워크/주소를 확인하세요"); }
  pwBusy=false; renderAll();
}

const DONUT_COLORS = ['#0F4C5C','#2E7D54','#2196A5','#B5851A','#7C5CBF','#C7553A','#3A9AD9','#5BAE8F','#E5873A','#6B7280'];

function buildDonut(positions) {
  const tw = positions.reduce((s,p)=>s+(Number(p.weight)||0),0);
  if(tw<=0) return null;
  const cx=100,cy=100,ro=78,ri=50;
  let paths='', angle=-Math.PI/2;
  positions.forEach((p,i)=>{
    const w=(Number(p.weight)||0)/tw;
    if(w<=0) return;
    const a=w*Math.PI*2, ea=angle+a, large=a>Math.PI?1:0;
    const c1=[Math.cos(angle),Math.sin(angle)], c2=[Math.cos(ea),Math.sin(ea)];
    const d=`M${(cx+ri*c1[0]).toFixed(1)},${(cy+ri*c1[1]).toFixed(1)} L${(cx+ro*c1[0]).toFixed(1)},${(cy+ro*c1[1]).toFixed(1)} A${ro},${ro} 0 ${large},1 ${(cx+ro*c2[0]).toFixed(1)},${(cy+ro*c2[1]).toFixed(1)} L${(cx+ri*c2[0]).toFixed(1)},${(cy+ri*c2[1]).toFixed(1)} A${ri},${ri} 0 ${large},0 ${(cx+ri*c1[0]).toFixed(1)},${(cy+ri*c1[1]).toFixed(1)}`;
    paths+=`<path d="${d}" fill="${DONUT_COLORS[i%DONUT_COLORS.length]}" stroke="#fff" stroke-width="2"/>`;
    angle=ea;
  });
  return paths;
}

function renderLedger(){
  const host = document.getElementById("ledger-host"); host.innerHTML = "";
  if (stateName!=="ok" || board.positions.length===0) return;

  if (editing){
    // 수정 모드 — 금액 표시
    const total = board.positions.reduce((s,p)=> s + (p.avgPrice||0)*(p.shares||0), 0);
    const sec = mk("section","ledger"); sec.appendChild(mk("div","section-lab","매수 현황 · 비중은 매수금액 기준"));
    const t = document.createElement("table"); t.className="ledger-t";
    t.innerHTML = "<thead><tr><th>종목</th><th>평균매수단가</th><th>주식수</th><th>매수금액</th><th>비중</th></tr></thead>";
    const tb = document.createElement("tbody");
    board.positions.forEach(p=>{
      const amt=(p.avgPrice||0)*(p.shares||0); const w=total>0?amt/total*100:0;
      const wcell = w>0 ? `<td class="num"><span class="wcell"><span class="wbar" style="width:${w.toFixed(0)}%"></span><span class="wval">${w.toFixed(1)}%</span></span></td>` : `<td class="num">—</td>`;
      const tr=document.createElement("tr");
      tr.innerHTML = `<td class="nm">${esc(p.name||"(이름 없음)")}</td><td class="num">${fmtN(p.avgPrice||0)}</td><td class="num">${fmtN(p.shares||0)}</td><td class="num">${fmtN(amt)}</td>`+wcell;
      tb.appendChild(tr);
    });
    t.appendChild(tb);
    const tf=document.createElement("tfoot");
    tf.innerHTML = `<tr><td>합계</td><td class="num">—</td><td class="num">—</td><td class="num">${fmtN(total)}</td><td class="num">${total>0?"100%":"—"}</td></tr>`;
    t.appendChild(tf); sec.appendChild(t);
    if (total===0) sec.appendChild(mk("div","ledger-cap","평균매수단가와 주식수를 입력하면 매수금액·비중이 계산돼요."));
    host.appendChild(sec);
  } else {
    // 공개 모드
    const tw = board.positions.reduce((s,p)=> s + (Number(p.weight)||0), 0);
    if (tw<=0) return;
    const sec = mk("section","ledger");

    // 헤더 행 (라벨 + 구분선 + 버튼들)
    const hdr = mk("div","ledger-hdr");
    hdr.appendChild(mk("span","ledger-hdr-text","포트 구성 · 비중"));
    hdr.appendChild(mk("span","ledger-hdr-line",""));
    const ctrl = mk("div","ledger-controls");
    if (pricesAt) ctrl.appendChild(mk("span","price-at","업데이트 "+fmt(pricesAt)));
    const updBtn = mk("button","btn sm", pricesBusy?"조회 중…":"업데이트");
    updBtn.disabled=pricesBusy; updBtn.onclick=()=>fetchPrices(); ctrl.appendChild(updBtn);
    const togBtn = mk("button","btn sm"+(showReturns?" primary":""), showReturns?"수익률 숨기기":"수익률 보기");
    togBtn.onclick=()=>{ showReturns=!showReturns; renderLedger(); }; ctrl.appendChild(togBtn);
    hdr.appendChild(ctrl); sec.appendChild(hdr);

    const t = document.createElement("table"); t.className="ledger-t";
    if (showReturns){
      t.innerHTML = "<thead><tr><th>종목</th><th>현재가</th><th>수익률</th><th>평가금액</th><th>비중</th></tr></thead>";
    } else {
      t.innerHTML = "<thead><tr><th>종목</th><th>비중</th></tr></thead>";
    }
    const tb = document.createElement("tbody");
    board.positions.forEach(p=>{
      const w=Number(p.weight)||0;
      const tr=document.createElement("tr");
      if (showReturns){
        const priceKey=(p.market==='KOSDAQ'?'KOSDAQ':'KRX')+':'+(p.ticker||'').padStart(6,'0');
        const cp=prices[priceKey]||null;
        const priv=privatePositions[p.ticker]||{};
        const avg=Number(p.avgPrice)||Number(priv.avgPrice)||0;
        const sh=Number(p.shares)||Number(priv.shares)||0;
        const cpCell=cp?`<td class="num">${fmtN(cp)}</td>`:`<td class="num">—</td>`;
        let retCell=`<td class="num">—</td>`, valCell=`<td class="num">—</td>`;
        if(cp&&avg>0){
          const ret=(cp-avg)/avg*100; const rc=ret>=0?"pos":"neg"; const rs=ret>=0?"+":"";
          retCell=`<td class="num"><span class="ret ${rc}">${rs}${ret.toFixed(2)}%</span></td>`;
          if(sh>0) valCell=`<td class="num">${fmtN(Math.round(cp*sh))}</td>`;
        }
        const wcell=w>0?`<td class="num">${w.toFixed(1)}%</td>`:`<td class="num">—</td>`;
        tr.innerHTML=`<td class="nm">${esc(p.name||"(이름 없음)")}</td>${cpCell}${retCell}${valCell}${wcell}`;
      } else {
        const wcell=w>0?`<td class="num">${w.toFixed(1)}%</td>`:`<td class="num">—</td>`;
        tr.innerHTML=`<td class="nm">${esc(p.name||"(이름 없음)")}</td>`+wcell;
      }
      tb.appendChild(tr);
    });
    t.appendChild(tb);
    const tf=document.createElement("tfoot");
    if(showReturns){
      const totCost=board.positions.reduce((s,p)=>{const priv=privatePositions[p.ticker]||{};const avg=Number(p.avgPrice)||Number(priv.avgPrice)||0;const sh=Number(p.shares)||Number(priv.shares)||0;return s+avg*sh;},0);
      const totCur=board.positions.reduce((s,p)=>{const pk=(p.market==='KOSDAQ'?'KOSDAQ':'KRX')+':'+(p.ticker||'').padStart(6,'0');const cp=prices[pk];const priv=privatePositions[p.ticker]||{};const sh=Number(p.shares)||Number(priv.shares)||0;return s+(cp&&sh?cp*sh:0);},0);
      let totRet=`<td class="num">—</td>`;
      if(totCost>0&&totCur>0){const r=(totCur-totCost)/totCost*100;const rc=r>=0?"pos":"neg";const rs=r>=0?"+":"";totRet=`<td class="num"><span class="ret ${rc}">${rs}${r.toFixed(2)}%</span></td>`;}
      tf.innerHTML=`<tr><td>합계</td><td class="num">—</td>${totRet}<td class="num">${totCur>0?fmtN(Math.round(totCur)):"—"}</td><td class="num">100%</td></tr>`;
    } else {
      tf.innerHTML=`<tr><td>합계</td><td class="num">100%</td></tr>`;
    }
    t.appendChild(tf); sec.appendChild(t);

    // 도넛 차트
    const donutPaths = buildDonut(board.positions);
    if(donutPaths){
      const wrap = mk("div","donut-wrap");
      const svgEl = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svgEl.setAttribute('viewBox','0 0 200 200'); svgEl.setAttribute('width','160'); svgEl.setAttribute('height','160');
      svgEl.style.flexShrink='0';
      svgEl.innerHTML = donutPaths;
      wrap.appendChild(svgEl);
      const leg = mk("div","donut-legend");
      board.positions.forEach((p,i)=>{
        const w=Number(p.weight)||0; if(w<=0) return;
        const item=mk("div","donut-leg-item");
        const dot=mk("span","donut-dot"); dot.style.background=DONUT_COLORS[i%DONUT_COLORS.length];
        item.appendChild(dot);
        item.appendChild(mk("span","donut-name",esc(p.name||"(이름 없음)")));
        item.appendChild(mk("span","donut-pct",w.toFixed(1)+"%"));
        leg.appendChild(item);
      });
      wrap.appendChild(leg); sec.appendChild(wrap);
    }

    host.appendChild(sec);
  }
}

  m.appendChild(mk("div","sub","저장할 때마다 직전 버전이 자동 백업돼요. 한 버전을 골라 불러오면 편집기에 적용되고, 저장하면 그 버전으로 되돌아갑니다."));
  if (historyLoading) m.appendChild(mk("div","cnt","불러오는 중…"));
  else if (!historyItems || historyItems.length===0) m.appendChild(mk("div","sub","아직 백업이 없어요. 한 번 저장하면 쌓이기 시작해요."));
  else historyItems.forEach(it=>{
    const row = mk("div","hrow"); const left = mk("div");
    left.appendChild(mk("div","when", fmt(it.ts)));
    left.appendChild(mk("div","cnt", (it.board && it.board.positions ? it.board.positions.length : 0)+"개 종목"));
    const btn = mk("button","btn sm","이 버전 불러오기");
    btn.onclick=()=>{ board = it.board; historyOpen=false; renderAll(); toast("편집기에 불러왔어요 — 저장해야 반영됩니다"); };
    row.appendChild(left); row.appendChild(btn); m.appendChild(row);
  });
  const foot = mk("div","modal-foot"); const close = mk("button","btn","닫기"); close.onclick=()=>{ historyOpen=false; renderModal(); };
  foot.appendChild(close); m.appendChild(foot); bg.appendChild(m); host.appendChild(bg);
}

/* ── 헬퍼 ── */
function segEl(p){
  const seg = mk("div","seg");
  STATUSES.forEach(([k,ko])=>{ const b=document.createElement("button"); b.textContent=ko; if(p.status===k) b.className="on "+k; b.onclick=()=>{ p.status=k; renderList(); }; seg.appendChild(b); });
  return seg;
}
function inputEl(val, ph, onin, mono){ const i=document.createElement("input"); i.className="f"+(mono?" mono":""); i.value=val||""; i.placeholder=ph; i.oninput=()=>onin(i.value); return i; }
function numInputEl(val, ph, onin){
  const i=document.createElement("input"); i.className="f mono"; i.type="text"; i.inputMode="numeric"; i.value=val>0?String(val):""; i.placeholder=ph;
  i.oninput=()=>{ const clean=i.value.replace(/[^\d]/g,""); if(i.value!==clean) i.value=clean; const n=parseInt(clean,10); onin(isNaN(n)?0:n); }; return i;
}
function noticeEl(title, body){ const d=mk("div","notice"); d.appendChild(mk("b",null,title)); d.appendChild(mk("span",null,body)); return d; }
function labEl(t){ const s=document.createElement("span"); s.className="field-lab"; s.textContent=t; return s; }
function mk(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtN(n){ return n>0 ? n.toLocaleString("ko-KR") : "—"; }
function fmt(ts){ const d=new Date(ts), p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2300); }

try {
  const cached = JSON.parse(localStorage.getItem('prices_cache_'+currentUser) || 'null');
  if (cached && cached.prices) { prices = cached.prices; pricesAt = new Date(cached.pricesAt); }
  const cachedPriv = JSON.parse(localStorage.getItem('private_positions_'+currentUser) || 'null');
  if (cachedPriv) privatePositions = cachedPriv;
} catch(e) {}
loadUsers().then(()=>{ renderUserTabs(); load(); });
document.getElementById('site-updated').textContent = fmt(new Date(document.lastModified));
</script>
