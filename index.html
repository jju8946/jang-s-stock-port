<style>

  .ledger-hdr{ display:flex; align-items:center; gap:10px; margin-bottom:13px; }

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════════════════════
   ▼ 1) 배포한 GAS 웹앱 주소(…/exec)  (thesis-board.gs 설정 6번) */
const API_URL = "https://script.google.com/macros/s/AKfycbwKvHfqxIggH08RuxpCRAsJ29lnSA9BnPVGl86Bl3hJcqhDWDDek6UdSEwdoeMeXfus/exec";
const DEFAULT_USER = "jinwook";
const ICAL_URL = "https://calendar.google.com/calendar/ical/090l8qctq19pu2dmclcnnn4134%40group.calendar.google.com/public/basic.ics";
/* ▼ 2) Cusdis 앱 ID  (cusdis.com 가입 → New Website → data-app-id 값)
        비워두면 댓글 영역에 "설정 필요" 안내만 떠요. */
const CUSDIS_APP_ID = "5d7f96f3-255c-4c55-98fd-cddd08589e02";
/* 비밀번호는 여기 없음 — Apps Script [스크립트 속성]의 EDIT_PASSWORD 에 보관 */
/* ════════════════════════════════════════════════════════ */

const STATUSES = [["valid","유효"],["watch","주의"],["broken","위험"]];
const STATUS_KO = Object.fromEntries(STATUSES);

let users = [], currentUser = DEFAULT_USER;
let portfolioItems = [], portfoliosLoading = false;
let board = { title:"포트폴리오", overall:"", updatedAt:null, positions:[] };
let stateName = "loading";   // loading | ok | error | setup
let editing = false, askingPw = false, pwError = false, pwBusy = false, saving = false;
let sessionPassword = null;  // 검증된 비번을 세션 동안만 메모리 보관(새로고침 시 사라짐)
let historyOpen = false, historyItems = null, historyLoading = false;
let comments = [], commentsLoaded = false, commentBusy = false, replyTo = null;
let prices = {}, pricesAt = null, showReturns = false, pricesBusy = false;
let allocationBasis = 'current'; // cost | current
let autoSaveTimer = null;
let autoSavePending = false;
let privatePositions = {}; // ticker → {avgPrice, shares} — 잠금 해제 세션에서만 보관
let verdictPending = null; // {i, status} — 비번 확인 후 적용할 상태 변경
let killConds = {}; // ticker → string — pre-mortem 조건 (localStorage)
let reviewed = {};  // ticker → timestamp — 마지막 검토 시각 (localStorage)
let calEvents = [], calLoaded = false, calOpen = false, calViewMonth = null;
let anchorHidden = false;
let viewUnlocked = false;        // 금액 보기 잠금 해제 여부
let askingViewPw = false, viewPwError = false, viewPwBusy = false;
let fullBoardCache = null;       // view unlock 시 서버에서 받은 전체 board 캐시
let pwChangeModal = false;
let pwChangeVal1 = '', pwChangeVal2 = '', pwChangeBusy = false, pwChangeError = '';
let posTags = {};       // ticker → {type:'B2B'|'B2C'|'수주', horizon:'단기'|'중기'|'장기'}
let myPrinciples = '';
let principlesOpen = false;
let addPortfolioModal = false, addPortfolioBusy = false, addPortfolioError = '';
let addPortfolioName = '', addPortfolioPassword = '', addPortfolioAdminPassword = '';

function saveKillConds(){ try{ localStorage.setItem('killconds_'+currentUser, JSON.stringify(killConds)); }catch(e){} }
function saveReviewed(){  try{ localStorage.setItem('reviewed_'+currentUser,  JSON.stringify(reviewed));  }catch(e){} }
function savePosTags(){   try{ localStorage.setItem('pos_tags_'+currentUser,  JSON.stringify(posTags));   }catch(e){} }
function saveMyPrinciples(){ try{ localStorage.setItem('my_principles_'+currentUser, myPrinciples); }catch(e){} }

/* ── 현재가 조회 (업데이트 버튼 → Apps Script/GOOGLEFINANCE → 스냅샷 저장) ── */
async function fetchPrices(){
  if (pricesBusy) return;
  pricesBusy = true; renderLedger();
  const tickerKeys = [...new Set(board.positions.filter(p=>p.ticker).map(p=>(p.market==='KOSDAQ'?'KOSDAQ':'KRX')+':'+(p.ticker||'').padStart(6,'0')))];
  if (!tickerKeys.length){ pricesBusy=false; renderLedger(); return; }
  if(!viewUnlocked){
    try{
      const priceRes=await fetch(API_URL+'?action=prices&tickers='+encodeURIComponent(tickerKeys.join(','))).then(r=>r.json());
      if(!priceRes||!priceRes.ok) throw new Error('price fetch fail');
      prices=priceRes.prices||{};
      pricesAt=priceRes.updatedAt?new Date(priceRes.updatedAt):null;
      localStorage.setItem('prices_cache_'+currentUser,JSON.stringify({prices,pricesAt}));
      const data=await fetch(API_URL+'?user='+encodeURIComponent(currentUser)+'&_='+Date.now()).then(r=>r.json());
      if(!data||!Array.isArray(data.positions)) throw new Error('board fetch fail');
      board=data;
      const fresh=Number(priceRes.freshCount)||0;
      toast(fresh+'/'+tickerKeys.length+'개 현재가 업데이트');
    }catch(e){ toast('현재비중 업데이트 실패'); }
    pricesBusy=false; renderAll(); return;
  }
  try{
    const r = await fetch(API_URL + '?action=prices&tickers=' + encodeURIComponent(tickerKeys.join(',')));
    const res = await r.json();
    if (res && res.ok){
      prices = res.prices || {};
      pricesAt = res.updatedAt ? new Date(res.updatedAt) : new Date();
      localStorage.setItem('prices_cache_'+currentUser, JSON.stringify({ prices, pricesAt }));
      const found = res.freshCount==null ? Object.keys(prices).length : Number(res.freshCount)||0;
      toast(found+'/'+tickerKeys.length+'개 현재가 업데이트');
    } else {
      toast('현재가 조회 실패');
    }
  }catch(e){ toast('현재가 조회 실패'); }
  pricesBusy = false; renderLedger();
}

/* ── API ── */
async function apiGet(){ const r = await fetch(API_URL, { method:"GET" }); return await r.json(); }
async function apiPost(payload){
  const r = await fetch(API_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
  return await r.json();
}

async function loadUsers(){
  try{
    const r = await fetch(API_URL + '?action=users');
    const res = await r.json();
    if(res && res.users && res.users.length) users = res.users;
  }catch(e){}
  if(!users.length) users = [{id:DEFAULT_USER,name:'진욱'}];
}

async function loadPortfolios(){
  portfoliosLoading = true;
  try{
    const r = await fetch(API_URL + '?action=all');
    const res = await r.json();
    if(res && res.ok && Array.isArray(res.items)){
      if(Array.isArray(res.users) && res.users.length) users = res.users;
      portfolioItems = res.items.filter(it=>it && it.userId!==DEFAULT_USER && it.board);
    } else portfolioItems = [];
  }catch(e){ portfolioItems = []; }
  portfoliosLoading = false;
  renderOtherPortfolios();
}

async function load(){
  if (!API_URL || API_URL.indexOf("http") !== 0){ stateName="setup"; renderAll(); return; }
  stateName="loading"; renderAll();
  try{
    const r = await fetch(API_URL + '?user=' + encodeURIComponent(currentUser));
    const data = await r.json();
    if (!data || !Array.isArray(data.positions)) throw new Error("bad payload");
    board = data; stateName="ok";
  }catch(e){ stateName="error"; }
  renderAll();
}

function renderUserTabs(){
  const host = document.getElementById("user-tabs-host"); if(!host) return;
  host.innerHTML = "";
}

function switchUser(id){
  if(id === currentUser) return;
  currentUser = id;
  editing=false; sessionPassword=null; askingPw=false; pwError=false;
  viewUnlocked=false; askingViewPw=false; viewPwError=false; fullBoardCache=null; pwChangeModal=false; allocationBasis='current';
  comments=[]; commentsLoaded=false; historyOpen=false; historyItems=null;
  try{
    const c = JSON.parse(localStorage.getItem('prices_cache_'+currentUser)||'null');
    if(c && c.prices){ prices=c.prices; pricesAt=new Date(c.pricesAt); } else { prices={}; pricesAt=null; }
    localStorage.removeItem('private_positions_'+currentUser);
    privatePositions = {};
    const cpt = JSON.parse(localStorage.getItem('pos_tags_'+currentUser)||'null');
    posTags = cpt || {};
    myPrinciples = localStorage.getItem('my_principles_'+currentUser) || '';
  }catch(e){ prices={}; pricesAt=null; privatePositions={}; posTags={}; myPrinciples=''; }
  load();
}

async function returnToAllPortfolios(){
  currentUser=DEFAULT_USER; editing=false; sessionPassword=null; askingPw=false; pwError=false;
  viewUnlocked=false; askingViewPw=false; viewPwError=false; fullBoardCache=null; allocationBasis='current';
  try{
    localStorage.removeItem('private_positions_'+currentUser); privatePositions={};
    const c=JSON.parse(localStorage.getItem('prices_cache_'+currentUser)||'null');
    if(c&&c.prices){ prices=c.prices; pricesAt=new Date(c.pricesAt); } else { prices={}; pricesAt=null; }
    killConds=JSON.parse(localStorage.getItem('killconds_'+currentUser)||'null')||{};
    reviewed=JSON.parse(localStorage.getItem('reviewed_'+currentUser)||'null')||{};
    posTags=JSON.parse(localStorage.getItem('pos_tags_'+currentUser)||'null')||{};
  }catch(e){ privatePositions={}; prices={}; pricesAt=null; killConds={}; reviewed={}; posTags={}; }
  await load();
  await loadPortfolios();
}

function scheduleAutoSave(){
  clearTimeout(autoSaveTimer);
  autoSavePending = true;
  autoSaveTimer = setTimeout(()=>{ if(editing) save(true); }, 1500);
}

async function save(isAuto=false){
  if (saving){ autoSavePending=true; return; }
  saving = true; autoSavePending=false; renderSavebar();
  try{
    const res = await apiPost({ action:"save", user:currentUser, password:sessionPassword, board:board });
    if (res && res.ok){
      toast(isAuto ? "자동저장 완료" : "저장됨");
      if (!isAuto){
        const savedBoard=JSON.parse(JSON.stringify(board));
        editing=false;
        if(currentUser!==DEFAULT_USER){ await returnToAllPortfolios(); return; }
        fullBoardCache=savedBoard; privatePositions={};
        await load(); await loadPortfolios(); return;
      }
      return;
    }
    if (res && res.error === "auth"){ toast("비밀번호가 만료됐어요 — 다시 수정을 눌러주세요"); editing=false; sessionPassword=null; fullBoardCache=null; await load(); return; }
    toast("저장 실패 — 다시 시도해 주세요");
  }catch(e){ toast("저장 실패 — 네트워크/주소를 확인하세요"); }
  finally{
    saving=false; renderSavebar();
    if(autoSavePending&&editing){
      clearTimeout(autoSaveTimer);
      autoSaveTimer=setTimeout(()=>save(true),250);
    }
  }
}

async function quickSetStatus(i, status){
  if(board.positions[i].status === status) return;
  board.positions[i].status = status;
  const ticker = board.positions[i].ticker;
  if(ticker){ reviewed[ticker] = Date.now(); saveReviewed(); }
  renderList();
  if(!sessionPassword){
    verdictPending = {i, status};
    askingPw=true; pwError=false; renderActions();
    return;
  }
  await quickSave();
}

async function quickSave(){
  // 공개 모드(publicBoard)에서 호출 시 avgPrice/shares 없어 데이터 손실 방지
  let boardToSave = board;
  if (!editing) {
    const hasFinancialData = board.positions.some(p => (p.avgPrice||0) > 0 || (p.shares||0) > 0);
    if (!hasFinancialData) {
      if (fullBoardCache) {
        const merged = JSON.parse(JSON.stringify(fullBoardCache));
        board.positions.forEach((pub, i) => {
          if (i < merged.positions.length && merged.positions[i].ticker === pub.ticker) {
            merged.positions[i].status = pub.status;
          }
        });
        merged.overall = board.overall;
        boardToSave = merged;
      } else {
        const positions = board.positions.map(p => {
          const priv = privatePositions[p.ticker] || {};
          return { name:p.name, ticker:p.ticker, status:p.status, idea:p.idea, note:p.note, market:p.market,
                   avgPrice:priv.avgPrice||0, shares:priv.shares||0 };
        });
        boardToSave = { title:board.title, overall:board.overall, updatedAt:board.updatedAt, positions };
      }
    }
  }
  try{
    const res = await apiPost({ action:"save", user:currentUser, password:sessionPassword, board:boardToSave });
    if(res && res.ok){
      toast("저장됨");
      if(!editing){
        fullBoardCache=JSON.parse(JSON.stringify(boardToSave));
        privatePositions={};
        await load();
      }
    }
    else if(res && res.error==="auth"){ toast("인증 만료 — 다시 클릭해주세요"); sessionPassword=null; fullBoardCache=null; }
    else toast("저장 실패");
  }catch(e){ toast("저장 실패"); }
}

/* ── 렌더 ── */
function renderAll(){ renderUserTabs(); renderMeta(); renderActions(); renderOverall(); renderList(); renderLedger(); renderOtherPortfolios(); renderComments(); renderPhilosophy(); renderSavebar(); renderModal(); }

function renderMeta(){
  document.getElementById("pf-title").textContent = board.title || "포트폴리오";
  const m = document.getElementById("pf-meta");
  if (editing){ m.textContent = "수정 중 — 변경 후 저장을 누르세요"; return; }
  if (stateName==="loading"){ m.textContent = "불러오는 중…"; return; }
  if (stateName==="setup"){ m.textContent = "설정 필요 · 코드 상단 API_URL을 채우세요"; return; }
  if (stateName==="error"){ m.textContent = "불러오지 못했어요 · API 주소/배포 확인"; return; }
  m.textContent = board.updatedAt ? "마지막 업데이트 · " + fmt(board.updatedAt) : "읽기 전용";
}

function renderActions(){
  const host = document.getElementById("actions"); host.innerHTML = "";
  if (stateName !== "ok" && !editing) return;

  if (editing){
    const hist = mk("button","btn sm","기록"); hist.onclick=()=>openHistory();
    host.appendChild(hist); return;
  }

  // 금액 보기 비밀번호 입력 중
  if (askingViewPw){
    const box = mk("div","pw");
    const inp = document.createElement("input"); inp.type="password"; inp.placeholder="금액 보기 비밀번호"; inp.disabled=viewPwBusy;
    inp.onkeydown = (e)=>{ if(e.key==="Enter") tryViewUnlock(inp.value); if(e.key==="Escape"){ askingViewPw=false; viewPwError=false; renderAll(); } };
    const go = mk("button","btn primary sm", viewPwBusy?"확인 중…":"확인"); go.disabled=viewPwBusy; go.onclick=()=>tryViewUnlock(inp.value);
    box.appendChild(inp); box.appendChild(go);
    if (viewPwError) box.appendChild(mk("span","err","불일치"));
    host.appendChild(box); setTimeout(()=>inp.focus(),0); return;
  }

  // 수정 비밀번호 입력 중
  if (askingPw){
    const box = mk("div","pw");
    const inp = document.createElement("input"); inp.type="password"; inp.placeholder="비밀번호"; inp.disabled=pwBusy;
    inp.onkeydown = (e)=>{ if(e.key==="Enter") tryUnlock(inp.value); if(e.key==="Escape"){ if(currentUser!==DEFAULT_USER) returnToAllPortfolios(); else { askingPw=false; pwError=false; renderAll(); } } };
    const go = mk("button","btn primary sm", pwBusy?"확인 중…":"확인"); go.disabled=pwBusy; go.onclick=()=>tryUnlock(inp.value);
    const cancel = mk("button","btn sm","취소"); cancel.disabled=pwBusy; cancel.onclick=()=>{ if(currentUser!==DEFAULT_USER) returnToAllPortfolios(); else { askingPw=false; pwError=false; renderAll(); } };
    box.appendChild(inp); box.appendChild(go); box.appendChild(cancel);
    if (pwError) box.appendChild(mk("span","err","불일치"));
    host.appendChild(box); setTimeout(()=>inp.focus(),0); return;
  }

  if(currentUser!==DEFAULT_USER){
    const back = mk("button","btn sm","전체 포트"); back.onclick=()=>returnToAllPortfolios(); host.appendChild(back);
  }

  // 금액 보기 잠금 해제 상태
  if (viewUnlocked){
    const lock = mk("button","btn sm","🔒 잠금"); lock.title="금액 숨기기";
    lock.onclick=()=>{ viewUnlocked=false; privatePositions={}; fullBoardCache=null; sessionPassword=null; allocationBasis='current'; try{localStorage.removeItem('private_positions_'+currentUser);}catch(e){} renderAll(); };
    host.appendChild(lock);
  } else {
    const viewBtn = mk("button","btn","🔒 금액 보기");

async function tryUnlock(v){
  if (pwBusy) return;
  pwBusy=true; pwError=false; renderActions();
  try{
    const res = await apiPost({ action:"auth", user:currentUser, password:v });
    if (res && res.ok && res.board){
      sessionPassword=v; board=res.board; askingPw=false; pwError=false;
      const priv={};
      board.positions.forEach(p=>{ priv[p.ticker]={avgPrice:p.avgPrice,shares:p.shares}; });
      privatePositions=priv;
      if(verdictPending !== null){
        board.positions[verdictPending.i].status = verdictPending.status;
        verdictPending = null;
        pwBusy=false; renderAll();
        await quickSave(); return;
      }
      editing=true;
    }
    else pwError=true;
  }catch(e){ pwError=true; toast("확인 실패 — 네트워크/주소를 확인하세요"); }
  pwBusy=false; renderAll();
}

async function tryViewUnlock(v){

const DONUT_COLORS = ['#0F4C5C','#2E7D54','#2196A5','#B5851A','#7C5CBF','#C7553A','#3A9AD9','#5BAE8F','#E5873A','#6B7280'];

function getPositionNumbers(p){
  const priv = privatePositions[p.ticker] || {};
  const avg = Number(p.avgPrice) || Number(priv.avgPrice) || 0;
  const shares = Number(p.shares) || Number(priv.shares) || 0;
  return { avg, shares };
}

function getPriceKey(p){
  return (p.market==='KOSDAQ'?'KOSDAQ':'KRX')+':'+(p.ticker||'').padStart(6,'0');
}

function getPortfolioMetrics(positions){
  const rows = positions.map(p=>{
    const { avg, shares } = getPositionNumbers(p);
    const price = Number(prices[getPriceKey(p)]) || 0;
    return { p, avg, shares, cost:avg*shares, price, current:price>0&&shares>0?price*shares:0 };
  });
  const holdings = rows.filter(r=>r.shares>0);
  const missingPriceCount = holdings.filter(r=>r.price<=0).length;
  const currentComplete = holdings.length>0 && missingPriceCount===0;
  const performanceComplete = currentComplete && holdings.every(r=>r.avg>0);
  return {
    rows,
    totalCost:rows.reduce((s,r)=>s+r.cost,0),
    totalCurrent:currentComplete?holdings.reduce((s,r)=>s+r.current,0):0,
    currentComplete,
    performanceComplete,
    missingPriceCount
  };
}

// 소수점 한 자리로 표시하면서 합계가 정확히 100.0%가 되도록 나머지를 배분한다.
function roundedWeights(values){
  const clean = values.map(v=>Math.max(0,Number(v)||0));
  const total = clean.reduce((s,v)=>s+v,0);
  if(total<=0) return clean.map(()=>0);
  const exact = clean.map(v=>v/total*1000);
  const units = exact.map(Math.floor);
  let remainder = 1000-units.reduce((s,v)=>s+v,0);
  const order = exact.map((v,i)=>({i,frac:v-units[i]})).sort((a,b)=>b.frac-a.frac||a.i-b.i);
  for(let i=0;i<remainder;i++) units[order[i%order.length].i]++;
  return units.map(v=>v/10);
}

function buildDonut(weights) {
  const tw = weights.reduce((s,w)=>s+(Number(w)||0),0);
  if(tw<=0) return null;
  const cx=100,cy=100,ro=78,ri=50;
  let paths='', angle=-Math.PI/2;
  weights.forEach((weight,i)=>{
    const w=(Number(weight)||0)/tw;
    if(w<=0) return;
    const a=w*Math.PI*2, ea=angle+a, large=a>Math.PI?1:0;
    const c1=[Math.cos(angle),Math.sin(angle)], c2=[Math.cos(ea),Math.sin(ea)];
    const d=`M${(cx+ri*c1[0]).toFixed(1)},${(cy+ri*c1[1]).toFixed(1)} L${(cx+ro*c1[0]).toFixed(1)},${(cy+ro*c1[1]).toFixed(1)} A${ro},${ro} 0 ${large},1 ${(cx+ro*c2[0]).toFixed(1)},${(cy+ro*c2[1]).toFixed(1)} L${(cx+ri*c2[0]).toFixed(1)},${(cy+ri*c2[1]).toFixed(1)} A${ri},${ri} 0 ${large},0 ${(cx+ri*c1[0]).toFixed(1)},${(cy+ri*c1[1]).toFixed(1)}`;
    paths+=`<path d="${d}" fill="${DONUT_COLORS[i%DONUT_COLORS.length]}" stroke="#fff" stroke-width="2"/>`;
    angle=ea;
  });
  return paths;
}

async function loadComments(){
  try{
    const r = await fetch(API_URL + '?action=comments&user=' + encodeURIComponent(currentUser));
    const res = await r.json();
    if(res && res.ok){ comments = res.comments || []; }
  }catch(e){}
  commentsLoaded = true;
  renderComments();
}

async function submitComment(){
  const nick = document.getElementById('cmt-nick').value.trim();
  const body = document.getElementById('cmt-body').value.trim();
  if(!nick || !body){ toast('닉네임과 내용을 입력해주세요'); return; }
  if(commentBusy) return;
  commentBusy = true;
  const btn = document.getElementById('cmt-submit'); if(btn) btn.disabled=true;
  try{
    const res = await apiPost({action:'addComment',nickname:nick,content:body,parentTs:0});
    if(res && res.ok){ toast('댓글이 등록됐어요'); document.getElementById('cmt-body').value=''; commentsLoaded=false; await loadComments(); }
    else if(res&&res.error==='rate_limited') toast('잠시 후 다시 등록해주세요');
    else toast('등록 실패');
  }catch(e){ toast('등록 실패'); }
  commentBusy = false;
}

async function submitReply(parentTs){
  const nickEl = document.getElementById('rep-nick-'+parentTs);
  const bodyEl = document.getElementById('rep-body-'+parentTs);
  const nick = (nickEl&&nickEl.value.trim()) || document.getElementById('cmt-nick').value.trim();
  const body = bodyEl ? bodyEl.value.trim() : '';
  if(!nick || !body){ toast('닉네임과 내용을 입력해주세요'); return; }
  if(commentBusy) return;
  commentBusy = true;
  const btn = document.getElementById('rep-submit-'+parentTs); if(btn) btn.disabled=true;
  try{
    const res = await apiPost({action:'addComment',nickname:nick,content:body,parentTs:parentTs});
    if(res && res.ok){ toast('답글이 등록됐어요'); replyTo=null; commentsLoaded=false; await loadComments(); }
    else if(res&&res.error==='rate_limited') toast('잠시 후 다시 등록해주세요');
    else toast('등록 실패');
  }catch(e){ toast('등록 실패'); }
  commentBusy = false;
}

function renderComments(){
  const host = document.getElementById("comments");
  const show = (!editing && stateName==="ok");
  host.style.display = show ? "block" : "none";
  if(!show) return;

  if(!commentsLoaded){ host.innerHTML='<div class="clab">댓글</div>'; loadComments(); return; }

  host.innerHTML = '';
  const topLevel = comments.filter(c=>!c.parentTs);
  const replyMap = {};
  comments.filter(c=>c.parentTs).forEach(c=>{ (replyMap[c.parentTs]||(replyMap[c.parentTs]=[])).push(c); });
  // replies sorted oldest-first for natural reading order
  Object.values(replyMap).forEach(arr=>arr.sort((a,b)=>a.ts-b.ts));

  host.appendChild(mk("div","clab","댓글 · "+topLevel.length+"개"));

  // 댓글 작성 폼
  const form = mk("div","comment-form");
  const row = mk("div","form-row");
  const nickInp = document.createElement("input"); nickInp.className="f"; nickInp.id="cmt-nick"; nickInp.placeholder="닉네임"; nickInp.maxLength=20;
  const submitBtn = mk("button","btn primary","등록"); submitBtn.id="cmt-submit"; submitBtn.onclick=()=>submitComment();
  row.appendChild(nickInp); row.appendChild(submitBtn);
  const bodyTa = document.createElement("textarea"); bodyTa.className="f"; bodyTa.id="cmt-body"; bodyTa.rows=2; bodyTa.placeholder="댓글을 입력하세요"; bodyTa.maxLength=300;
  form.appendChild(row); form.appendChild(bodyTa); host.appendChild(form);

  if(topLevel.length===0){
    host.appendChild(mk("div","ledger-cap","아직 댓글이 없어요. 첫 댓글을 남겨보세요!"));
  } else {
    const list = mk("div","cmt-list");
    topLevel.forEach(c=>{
      const item = mk("div","cmt");

      // 댓글 헤더 + 답글 버튼
      const h = mk("div","cmt-head");
      h.appendChild(mk("span","cmt-nick",c.nickname));
      h.appendChild(mk("span","cmt-time",fmt(c.ts)));
      const rBtn = mk("button","cmt-reply-btn"+(replyTo===c.ts?" active":""),"↩ 답글");
      rBtn.onclick=()=>{ replyTo=(replyTo===c.ts?null:c.ts); renderComments(); };
      h.appendChild(rBtn);
      item.appendChild(h);
      item.appendChild(mk("div","cmt-body",c.content));

      // 대댓글 목록
      const replies = replyMap[c.ts]||[];
      if(replies.length){
        const repList = mk("div","cmt-replies");
        replies.forEach(r=>{
          const ri = mk("div","cmt");
          const rh = mk("div","cmt-head");
          rh.appendChild(mk("span","cmt-nick","↳ "+r.nickname));
          rh.appendChild(mk("span","cmt-time",fmt(r.ts)));
          ri.appendChild(rh);
          ri.appendChild(mk("div","cmt-body",r.content));
          repList.appendChild(ri);
        });
        item.appendChild(repList);
      }

      // 답글 작성 폼 (토글)
      if(replyTo===c.ts){
        const rf = mk("div","cmt-reply-form");
        const rrow = mk("div","form-row");
        const rNick = document.createElement("input"); rNick.className="f"; rNick.id="rep-nick-"+c.ts; rNick.placeholder="닉네임"; rNick.maxLength=20;
        const mainNick = document.getElementById('cmt-nick'); if(mainNick&&mainNick.value) rNick.value=mainNick.value;
        const rSub = mk("button","btn primary","등록"); rSub.id="rep-submit-"+c.ts; rSub.onclick=(ts=>()=>submitReply(ts))(c.ts);
        const rCan = mk("button","btn","취소"); rCan.onclick=()=>{ replyTo=null; renderComments(); };
        rrow.appendChild(rNick); rrow.appendChild(rSub); rrow.appendChild(rCan);
        const rBody = document.createElement("textarea"); rBody.className="f"; rBody.id="rep-body-"+c.ts; rBody.rows=2; rBody.placeholder="답글을 입력하세요"; rBody.maxLength=300;
        rf.appendChild(rrow); rf.appendChild(rBody);
        item.appendChild(rf);
        setTimeout(()=>{ const el=document.getElementById('rep-body-'+c.ts); if(el) el.focus(); },50);
      }

      list.appendChild(item);
    });
    host.appendChild(list);
  }
}

const SHIFT_INFO = {
  'D':  { bg:'#DBEAFE', color:'#1E40AF', time:'07:00 ~ 14:00' },
  'A':  { bg:'#FEF3C7', color:'#92400E', time:'14:00 ~ 20:00' },
  'N':  { bg:'#1E293B', color:'#E2E8F0', time:'전날 20:00 ~ 당일 07:00' },
  'AN': { bg:'#78350F', color:'#FEF3C7', time:'당일 14:00 ~ 다음날 07:00' },
  'DA': { bg:'#CFFAFE', color:'#0E7490', time:'07:00 ~ 20:00' },
  'NA': { bg:'#312E81', color:'#FDE68A', time:'전날 20:00 ~ 당일 07:00 / 14:00 ~ 20:00' },
  'W':  { bg:'#EDE9FE', color:'#5B21B6', time:'' },
  '비번': { bg:'#EDE9FE', color:'#5B21B6', time:'' },
  '휴무': { bg:'#D1FAE5', color:'#065F46', time:'' },
  '휴가': { bg:'#D1FAE5', color:'#065F46', time:'' },
};
function getShiftCode(s){
  const u = String(s||'').trim().toUpperCase();
  for(const code of ['AN','DA','NA','D','A','N']){
    if(u===code || u.startsWith(code+' ') || u.startsWith(code+'(')) return code;
  }
  if(u==='W'||u.startsWith('W(')) return 'W';
  if(u.includes('비번')) return '비번';
  if(u.includes('휴무')) return '휴무';
  if(u.includes('휴가')) return '휴가';
  return null;
}
function getShiftInfo(s){
  const code = getShiftCode(s);
  if(code && SHIFT_INFO[code]) return SHIFT_INFO[code];
  for(const [k,v] of Object.entries(SHIFT_INFO)) if(s.includes(k)) return v;
  return {bg:'#F3F4F6', color:'#374151', time:''};
}
function getWeekMon(date){
  const d=new Date(date); d.setHours(0,0,0,0);
  const day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); return d;
}

function parseIcalDate(key, val){
  const allDay = key.includes('VALUE=DATE') || (val.length===8 && !val.includes('T'));
  if(allDay){ const y=+val.slice(0,4),m=+val.slice(4,6)-1,d=+val.slice(6,8); return {d:new Date(y,m,d),allDay:true}; }
  const y=+val.slice(0,4),mo=+val.slice(4,6)-1,dy=+val.slice(6,8),h=+val.slice(9,11),mi=+val.slice(11,13),s=+val.slice(13,15);
  return { d: val.endsWith('Z') ? new Date(Date.UTC(y,mo,dy,h,mi,s)) : new Date(y,mo,dy,h,mi,s), allDay:false };
}

function parseIcal(text){
  text = text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  const evs=[], recurBases=[];
  const re=/BEGIN:VEVENT([\s\S]*?)END:VEVENT/g; let m;
  while((m=re.exec(text))!==null){
    const block=m[1], ev={};
    const lr=/^([A-Z\-]+(?:;[^:]+)?):(.*)/gm; let lm;
    while((lm=lr.exec(block))!==null){
      const k=lm[1],v=lm[2].trim(),bk=k.split(';')[0];
      if(bk==='DTSTART')       ev.start=parseIcalDate(k,v);
      if(bk==='DTEND')         ev.end=parseIcalDate(k,v);
      if(bk==='SUMMARY')       ev.summary=v.replace(/\\,/g,',').replace(/\\/g,'').trim();
      if(bk==='RRULE')         ev.rrule=v;
      if(bk==='RECURRENCE-ID') ev.recId=parseIcalDate(k,v);
      if(bk==='EXDATE'){
        if(!ev.exdates) ev.exdates=new Set();
        v.split(',').forEach(d=>ev.exdates.add(d.trim().slice(0,8)));
      }
    }
    if(ev.summary&&ev.start){
      if(ev.rrule) recurBases.push(ev);
      else evs.push(ev);
    }
  }
  // RRULE expansion: only FREQ=DAILY supported (covers the 10일마다 shift pattern)
  const SHIFT_LABELS=['D','A','N','DA','NA','W'];
  const today=new Date(); today.setHours(0,0,0,0);
  const past=new Date(today);   past.setDate(past.getDate()-90);
  const future=new Date(today); future.setDate(future.getDate()+200);
  // Track dates that already have individual shift events (modified occurrences take priority)
  const takenKeys=new Set(evs
    .filter(e=>{const u=e.summary.toUpperCase();return SHIFT_LABELS.some(s=>u===s||u.startsWith(s+'('));})
    .map(e=>{const d=e.recId?e.recId.d:e.start.d;return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();})
  );
  recurBases.forEach(base=>{
    if(!/FREQ=DAILY/i.test(base.rrule)) return;
    const dm=base.rrule.match(/INTERVAL=(\d+)/i); if(!dm) return;
    const interval=parseInt(dm[1]);
    let until=null;
    const um=base.rrule.match(/UNTIL=(\d{8})/i);
    if(um){const uv=um[1];until=new Date(+uv.slice(0,4),+uv.slice(4,6)-1,+uv.slice(6,8));}
    const cutoff=until?new Date(Math.min(until.getTime(),future.getTime())):future;
    const dur=base.end?base.end.d.getTime()-base.start.d.getTime():86400000;
    let curr=new Date(base.start.d);
    while(curr<=cutoff){
      if(curr>=past){
        const ymd=`${curr.getFullYear()}${String(curr.getMonth()+1).padStart(2,'0')}${String(curr.getDate()).padStart(2,'0')}`;
        const key=curr.getFullYear()+'-'+(curr.getMonth()+1)+'-'+curr.getDate();
        const excluded=base.exdates&&base.exdates.has(ymd);
        if(!excluded&&!takenKeys.has(key)){
          evs.push({summary:base.summary,
            start:{d:new Date(curr),allDay:base.start.allDay},
            end:{d:new Date(curr.getTime()+dur),allDay:base.start.allDay}});
          takenKeys.add(key);
        }
      }
      curr.setDate(curr.getDate()+interval);
    }
  });
  return evs;
}

function evOnDate(ev, date){
  const check = new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const s = new Date(ev.start.d.getFullYear(),ev.start.d.getMonth(),ev.start.d.getDate());
  const eRaw = ev.end ? ev.end.d : ev.start.d;
  let e = new Date(eRaw.getFullYear(),eRaw.getMonth(),eRaw.getDate());
  if(ev.start.allDay && ev.end) e.setDate(e.getDate()-1); // iCal allDay end is exclusive
  return check >= s && check <= e;
}

function getDisplayEvents(date){
  return calEvents.filter(ev=>evOnDate(ev,date));
}

function getStripItems(date){
  const items=[];
  const add=(label,code,time)=>{
    if(!items.some(it=>it.label===label&&it.time===time)) items.push({label,code,time});
  };
  const prev=new Date(date.getFullYear(),date.getMonth(),date.getDate()-1);
  const own=getDisplayEvents(date);
  const next=new Date(date.getFullYear(),date.getMonth(),date.getDate()+1);

  // 전날의 AN은 오늘 오전 7시 퇴근으로 이어진다.
  if(getDisplayEvents(prev).some(ev=>getShiftCode(ev.summary)==='AN')) add('N 퇴근','N','07:00 퇴근');

  own.forEach(ev=>{
    const code=getShiftCode(ev.summary);
    if(code==='N') add('N 퇴근','N','07:00 퇴근');
    else if(code==='AN'){
      add('A','A','14:00~20:00');
      add('N 출근','N','20:00 출근');
    } else if(code==='NA'){
      add('N 퇴근','N','07:00 퇴근');
      add('A','A','14:00~20:00');
    } else {
      const info=getShiftInfo(ev.summary);
      add(ev.summary,code,info.time||'');
    }
  });

  // 캘린더의 내일 N/NA는 실제로는 오늘 20시에 출근한다.
  if(getDisplayEvents(next).some(ev=>['N','NA'].includes(getShiftCode(ev.summary)))){
    add('N 출근','N','20:00 출근');
  }
  return items;
}

function renderCal(){
  const host = document.getElementById('cal-host'); if(!host) return;
  host.innerHTML='';
  if(!calLoaded){ host.innerHTML='<div class="cal-widget"><span class="cal-loading">스케줄을 불러오지 못했어요</span></div>'; return; }
  const w = mk('div','cal-widget');
  const today = new Date(); today.setHours(0,0,0,0);
  const DOW = ['일','월','화','수','목','금','토'];

  // 헤더
  const hdr = mk('div','cal-hdr');
  hdr.appendChild(mk('span','cal-hdr-lab','📅 스케줄'));
  const togBtn = mk('button','btn sm', calOpen?'달력 닫기':'이번 달');
  togBtn.onclick=()=>{ calOpen=!calOpen; renderCal(); };
  hdr.appendChild(togBtn); w.appendChild(hdr);
  const legend=mk('div','cal-legend');
  legend.innerHTML='<b>D</b> 07:00~14:00 · <b>A</b> 14:00~20:00 · <b>N</b> 전날 20:00 출근 → 표시일 07:00 퇴근';
  w.appendChild(legend);

  // 오늘/내일
  const strip = mk('div','cal-strip');
  [today, new Date(today.getTime()+864e5)].forEach((date,dayIndex)=>{
    const col = mk('div','cal-strip-col');
    const dayLabel=dayIndex===0?'오늘':'내일';
    col.appendChild(mk('div','cal-strip-date',`${dayLabel} · ${date.getMonth()+1}/${date.getDate()} (${DOW[date.getDay()]})`));
    const items=getStripItems(date);
    if(items.length){
      const chipRow=mk('div','cal-chip-row');
      items.forEach(item=>{
        const info=item.code&&SHIFT_INFO[item.code]?SHIFT_INFO[item.code]:getShiftInfo(item.label);
        const chip=mk('div','cal-chip',item.label); chip.style.background=info.bg; chip.style.color=info.color;
        chipRow.appendChild(chip);
      });
      col.appendChild(chipRow);
      const times=items.map(item=>item.time).filter(Boolean);
      if(times.length) col.appendChild(mk('div','cal-time',times.join(' · ')));
    } else col.appendChild(mk('div','cal-empty','일정 없음'));
    strip.appendChild(col);
  });
  w.appendChild(strip);

  // 이번 주 표
  const mon = getWeekMon(today);
  const weekDays = Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
  const wsec = mk('div','cal-week-section');
  wsec.appendChild(mk('div','cal-week-label','이번 주'));
  const tbl=document.createElement('table'); tbl.className='cal-week-table';
  const thead=document.createElement('thead'), hrow=document.createElement('tr');
  weekDays.forEach((d,i)=>{
    const th=document.createElement('th'); th.className='cal-week-th';
    th.textContent=['월','화','수','목','금','토','일'][i];
    if(i===5) th.style.color='#3B82F6'; if(i===6) th.style.color='#EF4444';
    if(d.toDateString()===today.toDateString()) th.style.color='var(--valid)';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow); tbl.appendChild(thead);
  const tbody=document.createElement('tbody'), tr=document.createElement('tr');
  weekDays.forEach(d=>{
    const td=document.createElement('td'); td.className='cal-week-td';
    if(d.toDateString()===today.toDateString()) td.classList.add('cal-week-today');
    const evs=getDisplayEvents(d);
    if(evs.length){
      evs.forEach(ev=>{
        const info=getShiftInfo(ev.summary);
        const chip=mk('div','cal-cell-chip',ev.summary); chip.style.background=info.bg; chip.style.color=info.color;
        td.appendChild(chip);
      });
    } else { const dot=mk('span','','·'); dot.style.color='var(--ink-3)'; td.appendChild(dot); }
    tr.appendChild(td);
  });
  tbody.appendChild(tr); tbl.appendChild(tbody); wsec.appendChild(tbl); w.appendChild(wsec);

  // 월 달력 (토글)
  if(calOpen && calViewMonth){
    const mw=mk('div','cal-month-wrap');
    const nav=mk('div','cal-month-nav');
    const prev=mk('button','btn sm','‹'); prev.onclick=()=>{ calViewMonth.m--; if(calViewMonth.m<0){calViewMonth.m=11;calViewMonth.y--;} renderCal(); };
    const next=mk('button','btn sm','›'); next.onclick=()=>{ calViewMonth.m++; if(calViewMonth.m>11){calViewMonth.m=0;calViewMonth.y++;} renderCal(); };
    nav.appendChild(prev); nav.appendChild(mk('span','cal-month-label',`${calViewMonth.y}년 ${calViewMonth.m+1}월`)); nav.appendChild(next);
    mw.appendChild(nav);
    const mhrow=mk('div','cal-month-hrow');
    DOW.forEach((d,i)=>{ const dh=mk('div','cal-month-dh',d); if(i===0)dh.style.color='#EF4444'; if(i===6)dh.style.color='#3B82F6'; mhrow.appendChild(dh); });
    mw.appendChild(mhrow);
    const first=new Date(calViewMonth.y,calViewMonth.m,1), last=new Date(calViewMonth.y,calViewMonth.m+1,0);
    const cells=[]; for(let i=0;i<first.getDay();i++) cells.push(null);
    for(let d=1;d<=last.getDate();d++) cells.push(new Date(calViewMonth.y,calViewMonth.m,d));
    while(cells.length%7!==0) cells.push(null);
    for(let r=0;r<cells.length/7;r++){
      const row=mk('div','cal-month-row');
      for(let c=0;c<7;c++){
        const date=cells[r*7+c]; const cell=mk('div','cal-month-cell');
        if(date){
          if(date.toDateString()===today.toDateString()) cell.classList.add('today');
          const dn=mk('div','cal-dnum',String(date.getDate()));
          if(c===0) dn.classList.add('sun'); if(c===6) dn.classList.add('sat');
          cell.appendChild(dn);
          getDisplayEvents(date).forEach(ev=>{
            const info=getShiftInfo(ev.summary);
            const chip=mk('div','cal-cell-chip',ev.summary); chip.style.background=info.bg; chip.style.color=info.color;
            cell.appendChild(chip);
          });
        }
        row.appendChild(cell);
      }
      mw.appendChild(row);
    }
    w.appendChild(mw);
  }
  host.appendChild(w);
}

/* ── 헬퍼 ── */
function segEl(p){
  const seg = mk("div","seg");
  STATUSES.forEach(([k,ko])=>{ const b=document.createElement("button"); b.textContent=ko; if(p.status===k) b.className="on "+k; b.onclick=()=>{ p.status=k; renderList(); }; seg.appendChild(b); });
  return seg;
}
function inputEl(val, ph, onin, mono){ const i=document.createElement("input"); i.className="f"+(mono?" mono":""); i.value=val||""; i.placeholder=ph; i.oninput=()=>onin(i.value); return i; }
function numInputEl(val, ph, onin){
  const i=document.createElement("input"); i.className="f mono"; i.type="text"; i.inputMode="numeric"; i.value=val>0?String(val):""; i.placeholder=ph;
  i.oninput=()=>{ const clean=i.value.replace(/[^\d]/g,""); if(i.value!==clean) i.value=clean; const n=parseInt(clean,10); onin(isNaN(n)?0:n); }; return i;
}
function noticeEl(title, body){ const d=mk("div","notice"); d.appendChild(mk("b",null,title)); d.appendChild(mk("span",null,body)); return d; }
function labEl(t){ const s=document.createElement("span"); s.className="field-lab"; s.textContent=t; return s; }
function mk(tag, cls, txt){ const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtN(n){ return n>0 ? n.toLocaleString("ko-KR") : "—"; }
function fmt(ts){ const d=new Date(ts), p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2300); }
